<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ShadowAI — Users</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/config.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <a href="/dashboard" class="logo">SHADOW_AI</a>
    </div>
    <nav class="header-nav">
      <a href="/dashboard" class="nav-link">DASHBOARD</a>
      <a href="/app" class="nav-link">CHAT</a>
      <a href="/projects" class="nav-link">PROJECTS</a>
      <a href="/skills" class="nav-link">SKILLS</a>
      <a href="/rag" class="nav-link">KNOWLEDGE</a>
      <a href="/config" class="nav-link">CONFIG</a>
      <a href="/personality" class="nav-link">PERSONALITY</a>
      <a href="/heartbeat" class="nav-link">HEARTBEAT</a>
      <a href="/agents" class="nav-link">AGENTS</a>
      <a href="/pipelines" class="nav-link">PIPELINES</a>
      <span class="nav-link active">USERS</span>
      <a href="/editor" class="nav-link">EDITOR</a>
      <button type="button" id="logoutBtn" class="btn btn-small">LOGOUT</button>
    </nav>
  </header>

  <main class="config-main">
    <div class="config-card">
      <h1>USERS</h1>
      <p class="config-note">Manage local users and roles. Only admins can access this page.</p>

      <div id="usersError" class="status" style="color:var(--red); margin-bottom:8px;"></div>

      <section class="section">
        <h2>User list</h2>
        <table class="sm-table" id="usersTable">
          <thead>
            <tr><th>Username</th><th>Role</th><th>Actions</th></tr>
          </thead>
          <tbody id="usersTbody"></tbody>
        </table>
      </section>

      <section class="section">
        <h2>Add / update user</h2>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="userUsername" placeholder="username" />
        </div>
        <div class="form-group">
          <label>Password (leave blank to keep unchanged)</label>
          <input type="password" id="userPassword" placeholder="••••••••" />
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="userRole">
            <option value="user">User</option>
            <option value="admin">Admin</option>
            <option value="guest">Guest</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" id="userSaveBtn" class="btn">Save user</button>
          <span id="userStatus" class="status"></span>
        </div>
      </section>
    </div>
  </main>

  <script src="/static/users.js"></script>
</body>
</html>
