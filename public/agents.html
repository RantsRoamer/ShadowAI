<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ShadowAI — Agents</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/config.css" />
</head>
<body>
  <main class="config-main">
    <div class="config-card">
      <h1>AGENTS</h1>
      <p class="config-note">Configure additional Ollama models for specialized tasks (e.g. a dedicated coding model). Each agent can use the same or a different Ollama server. Agents are selectable in Chat and the Editor.</p>

      <section class="section">
        <div id="agentsList"></div>
        <button type="button" id="addAgent" class="btn btn-small">+ Add agent</button>
      </section>

      <div class="form-actions">
        <button type="button" id="saveBtn" class="btn">Save agents</button>
        <span id="status" class="status"></span>
      </div>
    </div>
  </main>

  <script src="/static/agents.js"></script>
</body>
</html>
