<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ShadowAI — My Data</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css" />
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/editor.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-left"><a href="/dashboard" class="logo">SHADOW_AI</a></div>
    <nav class="header-nav">
      <a href="/dashboard" class="nav-link">DASHBOARD</a>
      <a href="/app" class="nav-link">CHAT</a>
      <a href="/projects" class="nav-link">PROJECTS</a>
      <a href="/skills" class="nav-link">SKILLS</a>
      <a href="/rag" class="nav-link">KNOWLEDGE</a>
      <div class="nav-dropdown">
        <span class="nav-link nav-dropdown-toggle">SYSTEM</span>
        <div class="nav-dropdown-menu">
          <a href="/config" class="nav-link">CONFIG</a>
          <a href="/personality" class="nav-link">PERSONALITY</a>
          <a href="/heartbeat" class="nav-link">HEARTBEAT</a>
          <a href="/agents" class="nav-link">AGENTS</a>
          <a href="/pipelines" class="nav-link">PIPELINES</a>
          <a href="/autoagent" class="nav-link">AUTOAGENT</a>
          <a href="/users" class="nav-link">USERS</a>
        </div>
      </div>
      <span class="nav-link active">MY DATA</span>
      <a href="/profile" class="nav-link">ACCOUNT</a>
      <button type="button" id="logoutBtn" class="btn btn-small">LOGOUT</button>
    </nav>
  </header>

  <main class="editor-main">
    <aside class="editor-sidebar">
      <div class="sidebar-header">MY DATA</div>
      <div style="padding:6px 10px;border-bottom:1px solid var(--border);display:flex;gap:6px;">
        <button type="button" id="zipSelectedBtn" class="btn btn-small">ZIP SELECTED</button>
      </div>
      <div id="fileTree" class="file-tree"></div>
    </aside>

    <div class="editor-area">
      <div id="editorTabs" class="editor-tabs"></div>
      <div class="editor-toolbar">
        <span id="editorPath" class="editor-path">(no file open — click a file in the tree)</span>
        <div class="editor-toolbar-right">
          <select id="agentSelect" class="agent-select"><option value="">Main Brain</option></select>
          <span id="saveStatus" class="save-status"></span>
          <button type="button" id="downloadCurrentBtn" class="btn btn-small" disabled>DOWNLOAD FILE</button>
          <button type="button" id="sendToChatBtn" class="btn btn-small">SEND TO CHAT</button>
          <button type="button" id="saveBtn" class="btn btn-small" disabled>SAVE</button>
        </div>
      </div>
      <div class="editor-wrap"><textarea id="codeEditor"></textarea></div>
      <div class="ai-panel">
        <div class="ai-panel-header">AI ASSIST</div>
        <div class="ai-input-row">
          <textarea id="aiInstruction" rows="2" placeholder="Ask AI to create/refactor code in your file"></textarea>
          <button type="button" id="aiAskBtn" class="btn">ASK</button>
        </div>
        <div id="aiResponse" class="ai-response" hidden></div>
        <div class="ai-actions" id="aiActions" hidden>
          <button type="button" id="applyBtn" class="btn btn-small">APPLY CODE TO EDITOR</button>
          <span class="ai-apply-hint">Review changes and save to My Data.</span>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/python/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/markdown/markdown.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/edit/matchbrackets.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/selection/active-line.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="/static/nav.js"></script>
  <script src="/static/my-data.js"></script>
</body>
</html>
